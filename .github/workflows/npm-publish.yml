# npm Trusted Publisher (GitHub Actions OIDC) で公開する。
# npmjs.com の Package Settings → Trusted publishing で次を登録すること:
#   - Repository: stein2nd/textlint-rule-preset-swift-docs-ja
#   - Workflow filename: npm-publish.yml
#   - Environment: (未使用なら空)
name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Pack tarball to artifacts/
        run: npm run pack

      - name: Verify tarball in .sandbox/
        run: npm run verify:pack

      - name: Publish to npm
        run: |
          # setup-node が書く空の _authToken 行があると OIDC が無効化されるため除去する
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          sed -i '/_authToken/d' "$NPMRC_PATH"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ""

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: artifacts/*.tgz
